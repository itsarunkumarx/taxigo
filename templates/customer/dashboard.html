<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   {% extends 'base.html' %}

{% block content %}

<div class="container">

    <h2 class="mb-4">
        Welcome {{ request.user.username }}
    </h2>

    <div class="row">

        <div class="col-md-3">
            <div class="card bg-primary text-white shadow">
                <div class="card-body">
                    <h5>Total Bookings</h5>
                    <h2>{{ total_bookings }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-warning text-dark shadow">
                <div class="card-body">
                    <h5>Pending</h5>
                    <h2>{{ pending }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-success text-white shadow">
                <div class="card-body">
                    <h5>Completed</h5>
                    <h2>{{ completed }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card bg-danger text-white shadow">
                <div class="card-body">
                    <h5>Cancelled</h5>
                    <h2>{{ cancelled }}</h2>
                </div>
            </div>
        </div>

    </div>

    <div class="mt-5">

        <a href="{% url 'add_booking' %}" class="btn btn-primary">
            🚖 Book Taxi
        </a>

        <a href="{% url 'booking_list' %}" class="btn btn-success">
            📖 My Bookings
        </a>

    </div>

</div>

{% endblock %}
</body>
</html>
